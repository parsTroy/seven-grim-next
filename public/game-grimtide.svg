<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <radialGradient id="gt-sky" cx="55%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#1c0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="gt-moon-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc1100" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#660000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gt-ground-glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#5a0000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gt-center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="gt-blur-sm"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="gt-blur-md"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="gt-glow-red">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#gt-sky)"/>
  <!-- Ground atmosphere -->
  <rect width="800" height="450" fill="url(#gt-ground-glow)"/>

  <!-- City silhouettes -->
  <g fill="#090000">
    <rect x="0"   y="230" width="80"  height="220"/>
    <rect x="15"  y="200" width="28"  height="35"/>
    <rect x="90"  y="245" width="60"  height="205"/>
    <rect x="105" y="215" width="22"  height="35"/>
    <rect x="165" y="210" width="90"  height="240"/>
    <rect x="180" y="175" width="38"  height="40"/>
    <rect x="270" y="225" width="55"  height="225"/>
    <rect x="345" y="235" width="40"  height="215"/>
    <rect x="405" y="215" width="75"  height="235"/>
    <rect x="415" y="185" width="32"  height="35"/>
    <rect x="495" y="230" width="50"  height="220"/>
    <rect x="558" y="205" width="85"  height="245"/>
    <rect x="568" y="175" width="36"  height="35"/>
    <rect x="655" y="220" width="65"  height="230"/>
    <rect x="730" y="210" width="70"  height="240"/>
    <rect x="740" y="182" width="30"  height="32"/>
  </g>
  <!-- Window glows -->
  <g opacity="0.75">
    <rect x="185" y="225" width="13" height="9" fill="#3a1500"/>
    <rect x="208" y="248" width="13" height="9" fill="#2a0e00"/>
    <rect x="418" y="230" width="12" height="9" fill="#442000"/>
    <rect x="440" y="252" width="12" height="9" fill="#331500"/>
    <rect x="572" y="220" width="13" height="9" fill="#3a1a00"/>
    <rect x="595" y="244" width="13" height="9" fill="#291000"/>
    <rect x="665" y="238" width="11" height="8" fill="#3a1500"/>
  </g>

  <!-- Blood moon halo -->
  <circle cx="640" cy="85" r="100" fill="url(#gt-moon-halo)" filter="url(#gt-blur-md)"/>
  <!-- Moon body -->
  <circle cx="640" cy="85" r="50"  fill="#660000" opacity="0.5" filter="url(#gt-blur-sm)"/>
  <circle cx="640" cy="85" r="40"  fill="#880000"/>
  <circle cx="640" cy="85" r="36"  fill="#9a0a0a"/>
  <!-- Craters -->
  <circle cx="628" cy="76" r="7"   fill="#6a0000" opacity="0.55"/>
  <circle cx="654" cy="96" r="5"   fill="#580000" opacity="0.5"/>
  <circle cx="638" cy="104" r="3"  fill="#6a0000" opacity="0.45"/>

  <!-- Fog bands mid -->
  <rect x="0" y="310" width="800" height="50" fill="#1a0000" opacity="0.35" filter="url(#gt-blur-md)"/>
  <rect x="0" y="360" width="800" height="35" fill="#220000" opacity="0.4" filter="url(#gt-blur-md)"/>

  <!-- Zombie back row (faint, small) -->
  <g fill="#120000" opacity="0.55">
    <ellipse cx="40"  cy="348" rx="5" ry="6"/><rect x="36"  y="353" width="9"  height="18"/>
    <ellipse cx="80"  cy="345" rx="5" ry="6"/><rect x="76"  y="350" width="9"  height="18"/>
    <ellipse cx="120" cy="347" rx="5" ry="6"/><rect x="116" y="352" width="9"  height="18"/>
    <ellipse cx="165" cy="344" rx="5" ry="6"/><rect x="161" y="349" width="9"  height="18"/>
    <ellipse cx="210" cy="346" rx="5" ry="6"/><rect x="206" y="351" width="9"  height="18"/>
    <ellipse cx="255" cy="344" rx="5" ry="6"/><rect x="251" y="349" width="9"  height="18"/>
    <ellipse cx="305" cy="347" rx="5" ry="6"/><rect x="301" y="352" width="9"  height="18"/>
    <ellipse cx="355" cy="344" rx="5" ry="6"/><rect x="351" y="349" width="9"  height="18"/>
    <ellipse cx="400" cy="346" rx="5" ry="6"/><rect x="396" y="351" width="9"  height="18"/>
    <ellipse cx="450" cy="344" rx="5" ry="6"/><rect x="446" y="349" width="9"  height="18"/>
    <ellipse cx="500" cy="347" rx="5" ry="6"/><rect x="496" y="352" width="9"  height="18"/>
    <ellipse cx="548" cy="344" rx="5" ry="6"/><rect x="544" y="349" width="9"  height="18"/>
    <ellipse cx="598" cy="346" rx="5" ry="6"/><rect x="594" y="351" width="9"  height="18"/>
    <ellipse cx="648" cy="344" rx="5" ry="6"/><rect x="644" y="349" width="9"  height="18"/>
    <ellipse cx="698" cy="346" rx="5" ry="6"/><rect x="694" y="351" width="9"  height="18"/>
    <ellipse cx="748" cy="344" rx="5" ry="6"/><rect x="744" y="349" width="9"  height="18"/>
  </g>

  <!-- Zombie mid row -->
  <g fill="#1c0000" opacity="0.8">
    <ellipse cx="30"  cy="376" rx="8" ry="9"/><rect x="23"  y="384" width="14" height="25"/>
    <line x1="23"  y1="394" x2="9"   y2="408" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <line x1="37"  y1="392" x2="51"  y2="406" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="100" cy="373" rx="7" ry="8"/><rect x="94"  y="380" width="13" height="23"/>
    <line x1="94"  y1="390" x2="82"  y2="403" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="170" cy="375" rx="8" ry="9"/><rect x="163" y="383" width="14" height="25"/>
    <line x1="177" y1="392" x2="190" y2="406" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="248" cy="372" rx="7" ry="8"/><rect x="242" y="379" width="13" height="23"/>
    <line x1="242" y1="389" x2="230" y2="402" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <line x1="255" y1="387" x2="267" y2="400" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="330" cy="375" rx="8" ry="9"/><rect x="323" y="383" width="14" height="25"/>
    <line x1="323" y1="393" x2="310" y2="407" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="415" cy="372" rx="7" ry="8"/><rect x="409" y="379" width="13" height="23"/>
    <line x1="422" y1="388" x2="434" y2="401" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="488" cy="374" rx="8" ry="9"/><rect x="481" y="382" width="14" height="25"/>
    <line x1="481" y1="392" x2="468" y2="406" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <line x1="495" y1="390" x2="508" y2="404" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="570" cy="372" rx="7" ry="8"/><rect x="564" y="379" width="13" height="23"/>
    <line x1="564" y1="389" x2="552" y2="402" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="648" cy="375" rx="8" ry="9"/><rect x="641" y="383" width="14" height="25"/>
    <line x1="655" y1="392" x2="668" y2="406" stroke="#1c0000" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="730" cy="372" rx="7" ry="8"/><rect x="724" y="379" width="13" height="23"/>
    <line x1="724" y1="389" x2="712" y2="402" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
    <line x1="737" y1="387" x2="749" y2="400" stroke="#1c0000" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Zombie front row (large, darkest) -->
  <g fill="#280000">
    <ellipse cx="70"  cy="413" rx="12" ry="13"/><rect x="60"  y="425" width="22" height="33"/>
    <line x1="60"  y1="437" x2="41"  y2="453" stroke="#280000" stroke-width="8" stroke-linecap="round"/>
    <line x1="82"  y1="434" x2="101" y2="449" stroke="#280000" stroke-width="8" stroke-linecap="round"/>
    <rect x="62" y="458" width="9" height="18"/><rect x="74" y="458" width="9" height="18"/>

    <ellipse cx="240" cy="410" rx="11" ry="12"/><rect x="231" y="421" width="20" height="31"/>
    <line x1="231" y1="433" x2="214" y2="448" stroke="#280000" stroke-width="7" stroke-linecap="round"/>
    <rect x="233" y="452" width="8" height="16"/><rect x="244" y="452" width="8" height="16"/>

    <!-- Central survivor (lit from behind) -->
    <ellipse cx="400" cy="406" rx="9"  ry="10" fill="#1a0800"/>
    <rect x="391" y="415" width="18" height="28" fill="#1a1000" rx="1"/>
    <line x1="391" y1="425" x2="377" y2="440" stroke="#1a1000" stroke-width="6" stroke-linecap="round"/>
    <line x1="409" y1="423" x2="420" y2="408" stroke="#1a1000" stroke-width="6" stroke-linecap="round"/>
    <rect x="418" y="398" width="16" height="5"  fill="#100a00" rx="1"/>
    <rect x="392" y="443" width="7"  height="18" fill="#1a1000" rx="1"/>
    <rect x="402" y="443" width="7"  height="18" fill="#1a1000" rx="1"/>

    <ellipse cx="558" cy="411" rx="11" ry="12"/><rect x="549" y="422" width="20" height="31"/>
    <line x1="569" y1="432" x2="586" y2="447" stroke="#280000" stroke-width="7" stroke-linecap="round"/>
    <rect x="551" y="453" width="8" height="16"/><rect x="562" y="453" width="8" height="16"/>

    <ellipse cx="728" cy="413" rx="12" ry="13"/><rect x="718" y="425" width="22" height="33"/>
    <line x1="718" y1="437" x2="700" y2="453" stroke="#280000" stroke-width="8" stroke-linecap="round"/>
    <line x1="740" y1="434" x2="758" y2="449" stroke="#280000" stroke-width="8" stroke-linecap="round"/>
    <rect x="720" y="458" width="9" height="18"/><rect x="732" y="458" width="9" height="18"/>
  </g>

  <!-- Center spotlight (survivor glow) -->
  <ellipse cx="400" cy="435" rx="100" ry="30" fill="#ff4400" opacity="0.07" filter="url(#gt-blur-md)"/>

  <!-- Ground dark strip -->
  <rect x="0" y="435" width="800" height="15" fill="#040000" opacity="0.9"/>
  <!-- Top vignette -->
  <rect x="0" y="0"   width="800" height="40" fill="#000000" opacity="0.5"/>
</svg>
