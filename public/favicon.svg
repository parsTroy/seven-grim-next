<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fav-blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="fav-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#fav-bg)"/>

  <!--
    Scythe-7 mark. Natural size 62×80, scaled 0.73× and centred in 64×64.
    transform = translate( (64 - 62×0.73)/2 , (64 - 80×0.73)/2 )
              = translate( (64-45.26)/2 , (64-58.4)/2 )
              = translate( 9.37 , 2.8 )
    Rounded to translate(9, 3) scale(0.73)
  -->
  <g transform="translate(9,3) scale(0.73)">
    <!-- 7 body -->
    <path
      d="M 0,0 L 62,0 L 62,12
         C 60,18 57,27 53,38
         C 49,49 44,60 39,68
         C 36,74 27,80 17,78
         C 8,76 3,68 5,60
         C 10,53 18,56 23,52
         C 28,49 32,41 36,31
         C 38,25 39,19 39,12
         L 0,12 Z"
      fill="white"
    />
    <!-- Blade crescent accent -->
    <path
      d="M 39,68
         C 36,74 27,80 17,78
         C 8,76 3,68 5,60
         C 10,53 16,55 21,53
         L 18,62
         C 13,64 8,66 7,70
         C 9,74 16,74 22,70
         C 28,66 34,62 38,66 Z"
      fill="url(#fav-blade)"
      opacity="0.88"
    />
  </g>
</svg>
